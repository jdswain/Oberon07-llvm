<!doctype html>
<meta charset="utf-8">
<title>oc web port</title>
<style>
  /* The 3270 font from rbanffy/3270font — BSD-3-Clause. See
     fonts/LICENSE.txt. Loaded as a webfont so the terminal looks
     like the IBM 3270 we're emulating colour-wise. */
  @font-face {
    font-family: "3270";
    src: url("fonts/3270-Regular.ttf") format("truetype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "3270 Condensed";
    src: url("fonts/3270Condensed-Regular.ttf") format("truetype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "3270 SemiCondensed";
    src: url("fonts/3270SemiCondensed-Regular.ttf") format("truetype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root { --tui-bg: #000; --tui-fg: #00cc66; --tui-cursor: #00cc66; }
  body { font-family: system-ui, sans-serif; background: #1e1e1e; color: #ccc; margin: 1em; }
  h1 { font-weight: 400; font-size: 1em; color: #888; margin: 0 0 0.5em 0; }
  small { color: #888; }
  #term {
    font-family: "3270", ui-monospace, Menlo, Consolas, monospace;
    font-size: 18px;
    line-height: 1.1;
    background: var(--tui-bg);
    color: var(--tui-fg);
    padding: 0.5em;
    border: 1px solid #444;
    min-width: 80ch;
    min-height: 24em;
    outline: none;
    cursor: text;
    white-space: pre;
  }
  #term:focus { border-color: #88f; }
  /* Empty rows take the same height as content rows so the cursor
     landing on an otherwise empty row doesn't push the rows below
     down (matches line-height — no vertical reflow). */
  #term div { line-height: 1.1; min-height: 1.1em; }
</style>

<h1>oc web port — TUI bound to wasm, files proxied to the Go server</h1>
<div id="term" tabindex="0" data-wasm="app.wasm"></div>
<p>
  <small>
    Click the terminal to focus, then keys (incl. arrow keys, Ctrl-X, Meta-X)
    are queued and drained by Oberon's <code>TUI.ReadKey</code>.
    Files are served from the project base under <code>/api/files/…</code>.
  </small>
  <span id="status" style="margin-left:1em; color:#f88"></span>
</p>

<script type="module" src="dist/main.js"></script>
